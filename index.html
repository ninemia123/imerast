<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΕΞ. ΦΡΟΥΡΑ - FULL VERSION</title>
    <script src="cordova.js"></script>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <style>
        :root { 
            --green: #1b5e20; --blue: #0d47a1; --red: #b71c1c; --gold: #fbc02d; 
            --sat-bg: #e3f2fd; --sun-bg: #ffebee; --hol-bg: #ffcdd2; 
            --purple: #7b1fa2; --orange: #ff9800;
        }
        body { font-family: Arial, sans-serif; margin: 0; padding: 5px; background: #f0f0f0; user-select: none; }
        .main-card { max-width: 1100px; margin: auto; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .header { background: var(--green); color: white; padding: 10px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .header select { font-weight: bold; border-radius: 4px; border: none; padding: 10px; width: 100%; font-size: 14px; margin-top: 4px; }

        .month-totals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #e8f5e9; border-bottom: 2px solid var(--green); }
        .total-box { background: white; padding: 8px 2px; border-radius: 5px; text-align: center; border: 1px solid #c8e6c9; }
        .total-label { font-size: 9px; font-weight: bold; color: #444; display: block; }
        .total-val { font-size: 15px; font-weight: 900; color: var(--green); }

        .rep-container { padding: 8px 10px; background: #e3f2fd; border-bottom: 2px solid var(--blue); }
        .rep-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 8px; }
        .rep-label-small { font-size: 10px; font-weight: 900; color: var(--blue); margin-bottom: 2px; display: block; }
        .rep-input-compact { padding: 6px; border: 1px solid #90caf9; border-radius: 4px; background: white; font-weight: 900; font-size: 14px; text-align: center; color: var(--green); width: 100%; box-sizing: border-box; height: 32px; }
        .rep-display-compact { padding: 6px; border: 1px solid #4caf50; border-radius: 4px; background: white; font-weight: 900; font-size: 14px; text-align: center; color: var(--green); height: 32px; display: flex; align-items: center; justify-content: center; }

        .leave-panel { background: #f3e5f5; padding: 10px; border-bottom: 2px solid var(--purple); display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .leave-item { background: white; padding: 8px 4px; border-radius: 4px; text-align: center; border: 1px solid #d1c4e9; }
        .leave-count { font-size: 18px; font-weight: 900; color: var(--purple); line-height: 1; }
        .leave-name { font-size: 9px; font-weight: 900; color: #333; margin-top: 4px; display: block; }

        .weeks-banner { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 8px; background: #fffde7; border-bottom: 3px solid var(--gold); }
        .w-tile { background: white; border: 1px solid #ccc; padding: 4px; border-radius: 4px; text-align: center; font-size: 9px; line-height: 1.2; }
        .w-val { font-weight: 900; font-size: 11px; display: block; color: var(--blue); }
        .w-diff { font-weight: 900; font-size: 11px; display: block; color: var(--red); }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #bbb; height: 110px; vertical-align: top; padding: 4px; cursor: pointer; background: white; overflow: hidden; }
        .sat-cell { background: var(--sat-bg) !important; }
        .sun-cell { background: var(--sun-bg) !important; }
        .holiday-cell { background: var(--hol-bg) !important; border: 2.5px solid var(--red) !important; }
        .day-num { font-weight: 900; font-size: 16px; display: block; }
        .shift-tag { background: var(--blue); color: white; font-size: 9px; padding: 2px; border-radius: 3px; display: block; margin-top: 2px; text-align: center; font-weight: bold; }
        .night-tag { background: var(--purple); }
        .leave-tag { background: #9c27b0; }
        .day-note { font-size: 11px; color: #000; font-weight: 900; display: block; margin-top: 4px; border-top: 1px solid #eee; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; width: 98%; max-width: 550px; margin: 5px auto; padding: 10px; border-radius: 8px; max-height: 95vh; overflow-y: auto; box-sizing: border-box; }
        .m-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-bottom: 10px; }
        .m-btn { padding: 10px 4px; border: 1px solid #ccc; background: #f5f5f5; font-weight: bold; font-size: 11px; cursor: pointer; }
        .active-shift { background: #2196f3 !important; color: white !important; }

        .footer { padding: 15px; background: #fafafa; border-top: 4px solid var(--green); }
        .money-line { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 6px 0; font-size: 14px; font-weight: 900; }
        .total-net-box { background: var(--green); color: white; padding: 15px; text-align: center; font-size: 1.8em; font-weight: 900; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="main-card">
    <div class="header">
        <div class="top-row">
            <span>ΕΞΩΤΕΡΙΚΗ ΦΡΟΥΡΑ</span>
            <select>
                <option>Ιανουάριος</option>
                <option>Φεβρουάριος</option>
            </select>
        </div>
    </div>

    <div class="month-totals">
        <div class="total-box">
            <span class="total-label">Συνολικές ώρες</span>
            <span class="total-val">160</span>
        </div>
        <div class="total-box">
            <span class="total-label">Νυχτερινές</span>
            <span class="total-val">40</span>
        </div>
        <div class="total-box">
            <span class="total-label">Άδειες</span>
            <span class="total-val">5</span>
        </div>
        <div class="total-box">
            <span class="total-label">Ασθένειες</span>
            <span class="total-val">2</span>
        </div>
    </div>

    <div class="rep-container">
        <div class="rep-grid">
            <div>
                <span class="rep-label-small">Σάββατα</span>
                <input type="number" class="rep-input-compact" value="4">
            </div>
            <div>
                <span class="rep-label-small">Κυριακές</span>
                <input type="number" class="rep-input-compact" value="4">
            </div>
        </div>
    </div>

    <div class="leave-panel">
        <div class="leave-item">
            <span class="leave-count">2</span>
            <span class="leave-name">ΑΔΕΙΑ</span>
        </div>
        <div class="leave-item">
            <span class="leave-count">1</span>
            <span class="leave-name">ΑΣΘΕΝΕΙΑ</span>
        </div>
        <div class="leave-item">
            <span class="leave-count">0</span>
            <span class="leave-name">ΣΥΝΑΔΕΛΦΟΣ</span>
        </div>
        <div class="leave-item">
            <span class="leave-count">3</span>
            <span class="leave-name">ΑΠΟΥΣΙΑ</span>
        </div>
    </div>

    <div class="weeks-banner">
        <div class="w-tile"><span class="w-val">1</span><span class="w-diff">+0</span></div>
        <div class="w-tile"><span class="w-val">2</span><span class="w-diff">-1</span></div>
        <div class="w-tile"><span class="w-val">3</span><span class="w-diff">0</span></div>
        <div class="w-tile"><span class="w-val">4</span><span class="w-diff">+1</span></div>
        <div class="w-tile"><span class="w-val">5</span><span class="w-diff">0</span></div>
    </div>

    <table>
        <tr>
            <td class="sat-cell"><span class="day-num">1</span><span class="shift-tag">08:00-16:00</span></td>
            <td class="sun-cell"><span class="day-num">2</span><span class="shift-tag night-tag">22:00-06:00</span></td>
            <td><span class="day-num">3</span></td>
            <td><span class="day-num">4</span></td>
            <td class="holiday-cell"><span class="day-num">5</span><span class="leave-tag">ΑΔΕΙΑ</span></td>
        </tr>
    </table>

    <div class="footer">
        <div class="money-line"><span>Βασικός</span><span>1200€</span></div>
        <div class="money-line"><span>Επικίνδυνο</span><span>100€</span></div>
        <div class="total-net-box">Σύνολο: 1300€</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="m-grid">
            <div class="m-btn">08:00-16:00</div>
            <div class="m-btn">16:00-22:00</div>
            <div class="m-btn active-shift">22:00-06:00</div>
            <div class="m-btn leave-tag">Άδεια</div>
        </div>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed:', err));
}
</script>

</body>
</html>
